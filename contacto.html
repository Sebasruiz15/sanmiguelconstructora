    <main class="contenedor seccion">
        <h1>Contacto</h1>

        <div class="contacto">
            
            <form id="formulario-contacto" class="formulario">
                <fieldset>
                    <legend>Información Personal</legend>

                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="Tu correo electrónico" required>

                    <label for="telefono">Teléfono:</label>
                    <input type="tel" id="telefono" name="telefono" placeholder="Tu número de teléfono" required>
                </fieldset>

                <fieldset>
                    <legend>Mensaje</legend>

                    <label for="mensaje">Escribe tu mensaje:</label>
                    <textarea id="mensaje" name="mensaje" placeholder="Tu mensaje aquí..." required></textarea>
                </fieldset>

                <input type="submit" class="boton boton-grisOscuro" value="Enviar Mensaje">
            </form>
    </main>
